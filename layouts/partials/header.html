<header class="site-header">
  <div class="container">
    <a href="/" class="logo">{{ .Site.Title }}</a>
    <nav class="nav" aria-label="Navegación principal">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
